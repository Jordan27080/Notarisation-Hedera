version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7001:7001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:7001
      - Hedera__Network=${HEDERA_NETWORK:-testnet}
      - Hedera__OperatorAccountId=${HEDERA_OPERATOR_ACCOUNT_ID}
      - Hedera__OperatorPrivateKey=${HEDERA_OPERATOR_PRIVATE_KEY}
      - Hedera__TopicId=${HEDERA_TOPIC_ID}
      - Jwt__Key=${JWT_KEY}
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

